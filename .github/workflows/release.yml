name: release

# Tag-triggered release. This repo is public (no -dev mirror), so the
# workflow just creates a GitHub Release on this same repo from the tag.
# Packagist auto-detects the new tag via its webhook.
#
# Cut a release by tagging on main:
#   git tag -a v0.3.0 -m "Release v0.3.0"
#   git push origin v0.3.0

on:
  push:
    tags: ['v*']

jobs:
  release:
    # The reusable workflow creates a GitHub Release, so it needs
    # contents: write. The repo default token is read-only, and a called
    # workflow can't request more than the caller grants — omitting this
    # makes GitHub reject the run at startup (startup_failure, no jobs).
    permissions:
      contents: write
    uses: Codenzia/plugin-runtime/.github/workflows/plugin-release.yml@v1.1.0
    secrets: inherit
